{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block page_title %}
  <h1 class="text-2xl font-semibold tracking-tight text-slate-100">{{ title }}</h1>
{% endblock %}

{% block content %}
  <div class="max-w-xl rounded-2xl border border-slate-800 bg-slate-900 p-6 shadow-xl">
    <form method="post" class="space-y-5">
      {% csrf_token %}

      {% for field in form %}
        <div>
          <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-slate-300">
            {{ field.label }}
          </label>
          {{ field }}
          {% for error in field.errors %}
            <p class="mt-2 text-xs text-rose-300">{{ error }}</p>
          {% endfor %}
        </div>
      {% endfor %}

      <div class="flex items-center gap-3">
        <button type="submit" class="inline-flex rounded-xl bg-indigo-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-indigo-500">Save</button>
        <a href="{% url 'project_list' %}" class="text-sm font-medium text-slate-300 hover:text-slate-100">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
