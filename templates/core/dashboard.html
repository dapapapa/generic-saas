{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block page_title %}
  <div>
    <h1 class="text-2xl font-semibold tracking-tight text-slate-100">Dashboard</h1>
    <p class="mt-1 text-sm text-slate-400">Your workspace at a glance</p>
  </div>
{% endblock %}

{% block content %}
  <section class="max-w-3xl rounded-2xl border border-slate-800 bg-slate-900 p-6 shadow-xl">
    <p class="text-slate-300">
      Welcome back,
      <span class="font-semibold text-slate-100">{{ request.user.username }}</span>.
    </p>
    <p class="mt-2 text-slate-400">
      You have
      <span class="font-semibold text-slate-100">{{ projects|length }}</span>
      project(s).
    </p>
    <div class="mt-6">
      <a href="{% url 'project_list' %}" class="inline-flex items-center rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-indigo-500">
        Manage projects
      </a>
    </div>
  </section>
{% endblock %}
